name: TriPlanner CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Pobranie repozytorium
      uses: actions/checkout@v4

    - name: Konfiguracja Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalacja zależności
      working-directory: ./trip-service
      run: |
        python -m pip install --upgrade pip
        # Instalujemy pytest i httpx bezpośrednio, aby uniknąć błędów w razie braków w requirements.txt
        pip install pytest pytest-cov httpx flake8 fastapi uvicorn pydantic openai
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Testy statyczne (Linting)
      working-directory: ./trip-service
      run: |
        # flake8 sprawdzi błędy, ale opcja --exit-zero sprawi, że pipeline nie przerwie pracy przez błędy stylu
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Testy automatyczne i Coverage
      working-directory: ./trip-service
      run: |
        python -m pytest . --cov=. --cov-report=term-missing