name: TriPlanner CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Pobranie repozytorium
      uses: actions/checkout@v3

    - name: Konfiguracja Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip' # PUNKTY DODATKOWE: Cache zależności

    - name: Instalacja zależności (trip-service)
      working-directory: ./trip-service
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Testy statyczne (Linting Flake8)
      working-directory: ./trip-service
      run: |
        # Zatrzymuje build na błędach składni
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Ostrzeżenia (nie blokuje buildu)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: PUNKTY DODATKOWE - Skanowanie bezpieczeństwa (pip-audit)
      working-directory: ./trip-service
      run: |
        pip-audit || echo "Znaleziono podatności, ale kontynuujemy budowanie."

    - name: Testy automatyczne z Raportem Pokrycia (Coverage)
      working-directory: ./trip-service
      run: |
        pytest test_main.py --cov=. --cov-report=term-missing