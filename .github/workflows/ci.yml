name: TriPlanner CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Pobranie repozytorium
      uses: actions/checkout@v4

    - name: Konfiguracja Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalacja zależności (trip-service)
      working-directory: ./trip-service
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Testy statyczne (Linting Flake8)
      working-directory: ./trip-service
      run: |
        # flake8 sprawdzi błędy, ale nie przerwie buildu, jeśli coś znajdzie
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Testy automatyczne z Raportem Pokrycia (Coverage)
      working-directory: ./trip-service
      run: |
        # Używamy modułu pytest bezpośrednio
        python -m pytest test_main.py --cov=. --cov-report=term-missing